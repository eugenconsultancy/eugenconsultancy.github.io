<div class="modal fade" id="revisionModal" tabindex="-1" aria-labelledby="revisionModalLabel" aria-hidden="true">
    <div class="modal-dialog">
        <form action="{% url 'orders:request_revision' order.pk %}" method="POST" enctype="multipart/form-data" class="modal-content">
            {% csrf_token %}
            <div class="modal-header bg-warning text-dark">
                <h5 class="modal-title" id="revisionModalLabel"><i class="bi bi-pencil-square me-2"></i>Request Revision</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <div class="mb-3">
                    <label class="form-label fw-bold">Instructions</label>
                    <textarea name="revision_instructions" class="form-control" rows="5" placeholder="Specify exactly what needs to be changed..." required></textarea>
                    <div class="form-text text-muted small">Revisions should be based on the original order requirements.</div>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold">Attachment (Optional)</label>
                    <input type="file" name="attachment" class="form-control">
                    <div class="form-text small">You can upload a document highlighting necessary changes.</div>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button type="submit" class="btn btn-warning">Submit Request</button>
            </div>
        </form>
    </div>
</div>
