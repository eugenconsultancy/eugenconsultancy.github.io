<div class="modal fade" id="completeModal" tabindex="-1" aria-labelledby="completeModalLabel" aria-hidden="true">
    <div class="modal-dialog">
        <form action="{% url 'orders:complete' order.pk %}" method="POST" class="modal-content">
            {% csrf_token %}
            <div class="modal-header bg-success text-white">
                <h5 class="modal-title" id="completeModalLabel"><i class="bi bi-check2-circle me-2"></i>Approve & Complete Order</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body text-center py-4">
                <div class="mb-3">
                    <i class="bi bi-patch-check text-success" style="font-size: 3.5rem;"></i>
                </div>
                <h4>Ready to finalize?</h4>
                <p class="text-muted">By clicking "Confirm Completion," you acknowledge that the work meets your standards. <strong>The funds will be released to the writer immediately.</strong></p>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-light border" data-bs-dismiss="modal">Go Back</button>
                <button type="submit" class="btn btn-success px-4">Confirm Completion</button>
            </div>
        </form>
    </div>
</div>
