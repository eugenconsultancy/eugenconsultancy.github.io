<div class="modal fade" id="refundModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Process Refund</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <form method="post" action="{% url 'orders:admin_refund' order.pk %}">
                {% csrf_token %}
                <div class="modal-body">
                    <div class="alert alert-info">
                        <i class="bi bi-info-circle me-2"></i>
                        Process a refund to the client for this order.
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Refund Amount</label>
                        <div class="input-group">
                            <span class="input-group-text">$</span>
                            <input type="number" class="form-control" name="amount" 
                                   value="{{ order.price }}" min="0.01" max="{{ order.price }}" step="0.01" required>
                        </div>
                        <small class="text-muted">Maximum refund: ${{ order.price }}</small>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Refund Type</label>
                        <select class="form-select" name="refund_type">
                            <option value="full">Full Refund (100%)</option>
                            <option value="partial">Partial Refund</option>
                            <option value="split">Split Payment</option>
                        </select>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label">Reason for Refund</label>
                        <textarea class="form-control" name="reason" rows="3" required
                                  placeholder="Why are you processing this refund?"></textarea>
                    </div>
                    
                    <div class="form-check mb-3">
                        <input class="form-check-input" type="checkbox" name="notify_client" id="notifyRefund" checked>
                        <label class="form-check-label" for="notifyRefund">
                            Notify client about refund
                        </label>
                    </div>
                    
                    {% if order.writer %}
                    <div class="form-check mb-3">
                        <input class="form-check-input" type="checkbox" name="notify_writer" id="notifyWriterRefund" checked>
                        <label class="form-check-label" for="notifyWriterRefund">
                            Notify writer about refund
                        </label>
                    </div>
                    {% endif %}
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="submit" class="btn btn-primary">Process Refund</button>
                </div>
            </form>
        </div>
    </div>
</div>
