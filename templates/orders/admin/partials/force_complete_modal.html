<div class="modal fade" id="forceCompleteModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Force Complete Order</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <form method="post" action="{% url 'orders:force_complete' order.pk %}">
                {% csrf_token %}
                <div class="modal-body">
                    <div class="alert alert-warning">
                        <i class="bi bi-exclamation-triangle me-2"></i>
                        <strong>Warning:</strong> This will mark the order as completed and release payment to the writer.
                    </div>
                    
                    <p>You are about to force complete order <strong>{{ order.order_number }}</strong>.</p>
                    
                    <div class="mb-3">
                        <label class="form-label">Reason (optional)</label>
                        <textarea class="form-control" name="reason" rows="3" 
                                  placeholder="Why are you force completing this order?"></textarea>
                    </div>
                    
                    <div class="form-check mb-3">
                        <input class="form-check-input" type="checkbox" name="notify_parties" id="notifyForceComplete" checked>
                        <label class="form-check-label" for="notifyForceComplete">
                            Notify client and writer
                        </label>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="submit" class="btn btn-danger">Force Complete</button>
                </div>
            </form>
        </div>
    </div>
</div>
